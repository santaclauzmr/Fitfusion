cat > public/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
  <title>FitFusion Admin Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }

    .appbar {
      text-align:center; padding:15px;
      background:#111; font-weight:bold;
    }

    .container { max-width:500px; margin:auto; padding:10px; }

    .post {
      background:#1a1a1a;
      padding:15px;
      margin:10px 0;
      border-radius:12px;
    }

    input, textarea {
      width:100%; padding:10px; margin:5px 0;
      border:none; border-radius:8px;
      background:#222; color:white;
    }

    button {
      width:100%; padding:10px;
      border:none; border-radius:8px;
      background:#00c853; color:white;
      font-weight:bold;
    }

    .actions { display:flex; gap:5px; margin-top:10px; }

    .edit { background:orange; }
    .delete { background:red; }

    #adminBox {
      background:#111;
      padding:10px;
      margin:10px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<div class="appbar">🏋️ FitFusion Admin Blog</div>

<div class="container">

  <!-- ADMIN LOGIN -->
  <div id="adminBox">
    <input id="adminPass" type="password" placeholder="Enter Admin Password">
    <button onclick="login()">Login</button>
  </div>

  <div id="panel" style="display:none;">

    <input id="title" placeholder="Title">
    <textarea id="content" placeholder="Content"></textarea>
    <button onclick="addPost()">POST</button>

  </div>

  <div id="posts"></div>

</div>

<script>
  const ADMIN_PASSWORD = "1234"; // change this later

  let isAdmin = false;
  let editId = null;

  function login() {
    const pass = document.getElementById("adminPass").value;

    if (pass === ADMIN_PASSWORD) {
      isAdmin = true;
      document.getElementById("panel").style.display = "block";
      document.getElementById("adminBox").style.display = "none";
    } else {
      alert("Wrong password");
    }
  }

  function addPost() {
    if (!isAdmin) return;

    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if (editId) {
      db.collection("posts").doc(editId).update({ title, content });
      editId = null;
    } else {
      db.collection("posts").add({
        title,
        content,
        time: Date.now()
      });
    }
  }

  function editPost(id, title, content) {
    if (!isAdmin) return;

    document.getElementById("title").value = title;
    document.getElementById("content").value = content;
    editId = id;
  }

  function deletePost(id) {
    if (!isAdmin) return;

    db.collection("posts").doc(id).delete();
  }

  db.collection("posts").orderBy("time","desc")
    .onSnapshot(snapshot => {
      let html = "";

      snapshot.forEach(doc => {
        const p = doc.data();

        html += `
          <div class="post">
            <h2>${p.title}</h2>
            <p>${p.content}</p>

            <div class="actions">
              <button class="edit" onclick="editPost('${doc.id}','${p.title}','${p.content}')">Edit</button>
              <button class="delete" onclick="deletePost('${doc.id}')">Delete</button>
            </div>
          </div>
        `;
      });

      document.getElementById("posts").innerHTML = html;
    });
</script>

</body>
</html>
EOF

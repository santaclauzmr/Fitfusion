<!DOCTYPE html>
<html>
<head>
  <title>FitFusion</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo {
      height: 60px;
      width: auto;
      border-radius: 0;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .btn {
      background: black;
      color: white;
      padding: 10px 20px;
      border: none;
      margin-top: 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <!-- New Logo -->
  <img src="logo.png" class="logo">
</header>

<div class="hero">
  <h1>Build Your Body, Transform Your Life</h1>
  <p>Fitness | Health | Motivation</p>
  <button class="btn">Start Now</button>
</div>

</body>
</html>

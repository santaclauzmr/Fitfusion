<!DOCTYPE html>
<html>
<head>
  <title>FitFusion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: white;
    }

    header {
      background: black;
      padding: 10px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      height: 45px;
    }

    .btn {
      padding: 8px 15px;
      border: none;
      background: lime;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }

    .container {
      text-align: center;
      margin-top: 40px;
    }

    input, select {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    .card {
      background: #111;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<header>
  <img src="logo.png" class="logo">
  <button class="btn" onclick="logout()">Logout</button>
</header>

<!-- AUTH -->
<div class="container" id="authBox">
  <h2>FitFusion Login 🔐</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button class="btn" onclick="signup()">Signup</button>
  <button class="btn" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="container hidden" id="dashboard">
  <h2>Welcome 💪</h2>
  <p id="userEmail"></p>

  <!-- Workout Tracker -->
  <div class="card">
    <h3>🏋️ Workout Tracker</h3>
    <input type="text" id="workout" placeholder="Enter workout">
    <button class="btn" onclick="addWorkout()">Add</button>
    <ul id="workoutList"></ul>
  </div>

  <!-- Calories -->
  <div class="card">
    <h3>🔥 Calories Tracker</h3>
    <input type="number" id="calories" placeholder="Calories">
    <button class="btn" onclick="addCalories()">Add</button>
    <p id="totalCalories">Total: 0</p>
  </div>

  <!-- Diet -->
  <div class="card">
    <h3>🥗 Diet Plan</h3>
    <select id="goal">
      <option value="gain">Muscle Gain</option>
      <option value="loss">Fat Loss</option>
      <option value="maintain">Maintain</option>
    </select>
    <button class="btn" onclick="generateDiet()">Get Plan</button>
    <p id="dietResult"></p>
  </div>

  <!-- Workout Plan -->
  <div class="card">
    <h3>💪 Workout Plan</h3>
    <button class="btn" onclick="generateWorkout()">Get Plan</button>
    <p id="workoutResult"></p>
  </div>

  <!-- Coach -->
  <div class="card">
    <h3>🎯 Personal Coach</h3>
    <input type="number" id="weight" placeholder="Weight (kg)">
    <input type="number" id="height" placeholder="Height (cm)">
    <button class="btn" onclick="coach()">Get Advice</button>
    <p id="coachResult"></p>
  </div>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => {
    if (user) {
      authBox.classList.add("hidden");
      dashboard.classList.remove("hidden");
      userEmail.innerText = user.email;
    } else {
      authBox.classList.remove("hidden");
      dashboard.classList.add("hidden");
    }
  });

  window.signup = () => {
    createUserWithEmailAndPassword(auth, email.value, password.value)
      .catch(e => alert(e.message));
  };

  window.login = () => {
    signInWithEmailAndPassword(auth, email.value, password.value)
      .catch(e => alert(e.message));
  };

  window.logout = () => signOut(auth);

  // Workout
  window.addWorkout = () => {
    let li = document.createElement("li");
    li.textContent = workout.value;
    workoutList.appendChild(li);
  };

  // Calories
  let total = 0;
  window.addCalories = () => {
    total += parseInt(calories.value) || 0;
    totalCalories.innerText = "Total: " + total;
  };

  // Diet
  window.generateDiet = () => {
    let g = goal.value;
    let text = g === "gain"
      ? "Eggs, Chicken, Milk 🍗"
      : g === "loss"
      ? "Salad, Fruits 🥗"
      : "Balanced diet 🍚";

    dietResult.innerText = text;
  };

  // Workout Plan
  window.generateWorkout = () => {
    workoutResult.innerText =
      "Pushups, Squats, Plank, Running 💪";
  };

  // Coach
  window.coach = () => {
    let w = weight.value, h = height.value;
    let bmi = w / ((h/100)**2);

    coachResult.innerText =
      bmi < 18.5 ? "Gain weight 💪"
      : bmi < 25 ? "You are fit ✅"
      : "Lose weight 🔥";
  };
</script>

</body>
</html>

cat > public/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
  <title>FitFusion Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js"></script>

  <style>
    body { font-family: Arial; margin:0; background:#f4f4f4; }
    header { background:#111; color:#fff; padding:20px; text-align:center; }
    .container { max-width:800px; margin:auto; padding:20px; }

    input, textarea {
      width:100%; padding:10px; margin:5px 0;
    }

    button {
      padding:10px; border:none; cursor:pointer;
      margin:5px 5px 5px 0;
    }

    .post {
      background:#fff; padding:15px; margin-bottom:10px;
      border-radius:10px;
    }

    .edit { background:orange; color:#fff; }
    .delete { background:red; color:#fff; }
    .add { background:black; color:#fff; width:100%; }
  </style>
</head>

<body>

<header>
  <h1>FitFusion Blog 🚀</h1>
</header>

<div class="container">

  <h3>Add / Edit Post</h3>
  <input id="title" placeholder="Title">
  <textarea id="content" placeholder="Content"></textarea>
  <button class="add" onclick="addPost()">Add Post</button>

  <h3>Posts</h3>
  <div id="posts"></div>

</div>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "fitfusion-77786.firebaseapp.com",
    projectId: "fitfusion-77786"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let editId = null;

  function addPost() {
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if (editId) {
      db.collection("posts").doc(editId).update({
        title,
        content
      });
      editId = null;
    } else {
      db.collection("posts").add({
        title,
        content,
        time: Date.now()
      });
    }

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
  }

  function editPost(id, title, content) {
    document.getElementById("title").value = title;
    document.getElementById("content").value = content;
    editId = id;
  }

  function deletePost(id) {
    db.collection("posts").doc(id).delete();
  }

  db.collection("posts").orderBy("time","desc")
    .onSnapshot(snapshot => {
      let html = "";

      snapshot.forEach(doc => {
        const p = doc.data();

        html += `
          <div class="post">
            <h2>${p.title}</h2>
            <p>${p.content}</p>

            <button class="edit" onclick="editPost('${doc.id}','${p.title}','${p.content}')">Edit</button>
            <button class="delete" onclick="deletePost('${doc.id}')">Delete</button>
          </div>
        `;
      });

      document.getElementById("posts").innerHTML = html;
    });
</script>

</body>
</html>
EOF
